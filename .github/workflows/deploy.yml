name: Deploy to Google Cloud VM

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VM
        if: false
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/eladz/noga/"

      - name: SSH and deploy
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 10
          timeout_minutes: 10
          command: |
            echo "${{ secrets.GCP_VM_SSH_KEY }}" > /tmp/ssh_key
            chmod 600 /tmp/ssh_key
            ssh -o StrictHostKeyChecking=no -i /tmp/ssh_key ${{ secrets.GCP_VM_USERNAME }}@${{ secrets.GCP_VM_HOST }} << 'EOF'
            cd /home/eladz/noga/
            docker pull eladzazon/noga-whatsapp-assistant:latest
            docker compose up -d noga
            EOF
            rm -f /tmp/ssh_key
